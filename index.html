<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0b">
<link rel="manifest" href="manifest.json">
<title>CashFlow_</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0b;--bg2:#111113;--bg3:#1a1a1e;--bg4:#222228;
--tx:#f0f0f2;--tx2:#8a8a96;--tx3:#55555f;
--accent:#00e599;--accent2:#00c280;--accent-dim:rgba(0,229,153,0.12);
--red:#ff4466;--orange:#ff9933;--blue:#3399ff;
--radius:14px;--radius-sm:10px;
--safe-top:env(safe-area-inset-top,0px);
--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;
-webkit-tap-highlight-color:transparent;overscroll-behavior:none;
min-height:100vh;min-height:100dvh;
}
body{padding-top:var(--safe-top);padding-bottom:calc(70px + var(--safe-bottom))}
input,button,textarea,select{font-family:inherit;border:none;outline:none;background:none;color:inherit}
button{cursor:pointer;-webkit-appearance:none}
.mono{font-family:'JetBrains Mono',monospace}

/* TOAST */
#toast{
position:fixed;top:calc(20px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-100px);
background:var(--accent);color:var(--bg);padding:10px 24px;border-radius:40px;
font-weight:600;font-size:14px;z-index:9999;
transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
pointer-events:none;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* HEADER */
.header{
position:sticky;top:0;z-index:100;
background:rgba(10,10,11,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
padding:12px 20px;padding-top:calc(12px + var(--safe-top));
display:flex;align-items:center;justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,0.06);
}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.header h1 span{color:var(--accent)}
.header-actions{display:flex;gap:8px}
.header-btn{
width:38px;height:38px;border-radius:50%;
background:var(--bg3);display:flex;align-items:center;justify-content:center;
transition:background 0.2s;
}
.header-btn:active{background:var(--bg4)}
.header-btn svg{width:18px;height:18px;stroke:var(--tx2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* INPUT AREA */
.input-area{
padding:20px;padding-bottom:16px;
background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);
border-bottom:1px solid rgba(255,255,255,0.04);
}
.amount-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.amount-currency{font-size:32px;font-weight:700;color:var(--tx3);font-family:'JetBrains Mono',monospace}
.amount-input{
flex:1;font-size:40px;font-weight:700;font-family:'JetBrains Mono',monospace;
background:transparent;color:var(--tx);
caret-color:var(--accent);
width:100%;
}
.amount-input::placeholder{color:var(--tx3);opacity:0.5}
.amount-input::-webkit-outer-spin-button,
.amount-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.amount-input[type=number]{-moz-appearance:textfield}

/* CATEGORIES */
.cat-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cat-btn{
padding:8px 16px;border-radius:40px;font-size:13px;font-weight:500;
background:var(--bg3);color:var(--tx2);
transition:all 0.2s;white-space:nowrap;
border:1.5px solid transparent;
}
.cat-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.cat-btn:active{transform:scale(0.95)}

/* EXTRAS ROW */
.extras-row{display:flex;gap:8px;align-items:center}
.extra-btn{
display:flex;align-items:center;gap:6px;
padding:8px 14px;border-radius:var(--radius-sm);
background:var(--bg3);color:var(--tx2);font-size:12px;font-weight:500;
transition:all 0.2s;
}
.extra-btn:active{background:var(--bg4)}
.extra-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.extra-btn.has-value{color:var(--accent);background:var(--accent-dim)}
.note-input{
flex:1;padding:8px 14px;border-radius:var(--radius-sm);
background:var(--bg3);color:var(--tx);font-size:13px;
}
.note-input::placeholder{color:var(--tx3)}
.note-input.visible{display:block}
.note-input.hidden{display:none}

/* SAVE BTN */
.save-row{margin-top:14px}
.save-btn{
width:100%;padding:14px;border-radius:var(--radius);
background:var(--accent);color:var(--bg);
font-size:15px;font-weight:700;letter-spacing:-0.3px;
transition:all 0.2s;
}
.save-btn:active{transform:scale(0.97);background:var(--accent2)}
.save-btn:disabled{opacity:0.3;transform:none}

/* SECTION */
.section{padding:20px}
.section-head{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:16px;
}
.section-title{font-size:13px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:1px}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;gap:12px}
.month-nav-btn{
width:32px;height:32px;border-radius:50%;background:var(--bg3);
display:flex;align-items:center;justify-content:center;transition:background 0.2s;
}
.month-nav-btn:active{background:var(--bg4)}
.month-nav-btn svg{width:16px;height:16px;stroke:var(--tx2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.month-label{font-size:15px;font-weight:600;min-width:140px;text-align:center}

/* SUMMARY CARDS */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.summary-card{
background:var(--bg2);border-radius:var(--radius);padding:16px;
border:1px solid rgba(255,255,255,0.04);
}
.summary-card.full{grid-column:1/-1}
.summary-label{font-size:11px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.summary-value{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.summary-sub{font-size:11px;color:var(--tx3);margin-top:4px;font-family:'JetBrains Mono',monospace}

/* PIE CHART */
.pie-wrap{display:flex;align-items:center;gap:20px;margin-bottom:20px}
.pie-svg{width:130px;height:130px;flex-shrink:0}
.pie-legend{flex:1;display:flex;flex-direction:column;gap:8px}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pie-legend-label{flex:1;color:var(--tx2)}
.pie-legend-val{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px}

/* DAY GROUP */
.day-group{margin-bottom:20px}
.day-header{
display:flex;align-items:center;justify-content:space-between;
padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:8px;
}
.day-date{font-size:13px;font-weight:600;color:var(--tx2)}
.day-total{font-size:13px;font-weight:600;color:var(--tx3);font-family:'JetBrains Mono',monospace}

/* EXPENSE ITEM */
.exp-item{
display:flex;align-items:center;gap:12px;
padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.03);
}
.exp-item:last-child{border-bottom:none}
.exp-cat-dot{
width:36px;height:36px;border-radius:10px;
display:flex;align-items:center;justify-content:center;
font-size:16px;flex-shrink:0;
}
.exp-info{flex:1;min-width:0}
.exp-cat-name{font-size:14px;font-weight:500}
.exp-note{font-size:11px;color:var(--tx3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-amount{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.exp-delete{
width:28px;height:28px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
background:transparent;transition:background 0.2s;flex-shrink:0;
}
.exp-delete:active{background:rgba(255,68,102,0.15)}
.exp-delete svg{width:14px;height:14px;stroke:var(--tx3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--tx3)}
.empty-state .emoji{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:13px;line-height:1.5}

/* TAB BAR */
.tab-bar{
position:fixed;bottom:0;left:0;right:0;z-index:100;
background:rgba(10,10,11,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,0.06);
display:flex;padding-bottom:var(--safe-bottom);
}
.tab-item{
flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
padding:10px 0;color:var(--tx3);font-size:10px;font-weight:500;
transition:color 0.2s;
}
.tab-item.active{color:var(--accent)}
.tab-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* VIEWS */
.view{display:none}
.view.active{display:block}

/* MODAL */
.modal-overlay{
position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);
display:none;align-items:flex-end;justify-content:center;
backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.modal-overlay.show{display:flex}
.modal{
background:var(--bg2);border-radius:20px 20px 0 0;
width:100%;max-width:500px;max-height:85vh;overflow-y:auto;
padding:24px;padding-bottom:calc(24px + var(--safe-bottom));
animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{
width:36px;height:4px;border-radius:2px;background:var(--bg4);
margin:0 auto 20px;
}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}

/* SETTINGS */
.setting-group{margin-bottom:24px}
.setting-label{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.setting-item{
display:flex;align-items:center;justify-content:space-between;
padding:14px 16px;background:var(--bg3);border-radius:var(--radius-sm);
margin-bottom:6px;
}
.setting-item-text{font-size:14px;font-weight:500}
.setting-item-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.setting-action{
padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
background:var(--accent-dim);color:var(--accent);
}
.setting-action:active{opacity:0.7}
.setting-action.red{background:rgba(255,68,102,0.12);color:var(--red)}

/* CATEGORY EDIT */
.cat-edit-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.cat-edit-item{
display:flex;align-items:center;gap:10px;
padding:12px 14px;background:var(--bg3);border-radius:var(--radius-sm);
}
.cat-edit-emoji{font-size:20px;width:30px;text-align:center}
.cat-edit-name{flex:1;font-size:14px;font-weight:500}
.cat-edit-del{
width:28px;height:28px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
}
.cat-edit-del:active{background:rgba(255,68,102,0.15)}
.cat-edit-del svg{width:14px;height:14px;stroke:var(--red);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cat-add-row{display:flex;gap:8px;margin-top:12px}
.cat-add-input{
flex:1;padding:10px 14px;border-radius:var(--radius-sm);
background:var(--bg4);color:var(--tx);font-size:14px;
}
.cat-add-input::placeholder{color:var(--tx3)}
.cat-add-emoji{
width:44px;padding:10px;border-radius:var(--radius-sm);
background:var(--bg4);color:var(--tx);font-size:18px;text-align:center;
}
.cat-add-btn{
padding:10px 16px;border-radius:var(--radius-sm);
background:var(--accent);color:var(--bg);font-weight:700;font-size:13px;
}
.cat-add-btn:active{opacity:0.7}

/* DATE PICKER */
.date-input{
padding:8px 14px;border-radius:var(--radius-sm);
background:var(--bg4);color:var(--tx);font-family:'JetBrains Mono',monospace;
font-size:13px;
}

/* CONFIRM DIALOG */
.confirm-overlay{
position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7);
display:none;align-items:center;justify-content:center;padding:20px;
}
.confirm-overlay.show{display:flex}
.confirm-box{
background:var(--bg2);border-radius:var(--radius);padding:24px;
max-width:320px;width:100%;text-align:center;
}
.confirm-msg{font-size:15px;margin-bottom:20px;line-height:1.5}
.confirm-actions{display:flex;gap:10px}
.confirm-btn{
flex:1;padding:12px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;
}
.confirm-btn.cancel{background:var(--bg4);color:var(--tx2)}
.confirm-btn.danger{background:var(--red);color:#fff}

/* SCROLL AREA PADDING */
.scroll-pad{height:90px}
</style>
</head>
<body>

<div id="toast"></div>

<!-- HEADER -->
<div class="header">
  <h1>CashFlow<span>_</span></h1>
  <div class="header-actions">
    <button type="button" class="header-btn" onclick="openSettings()">
      <svg viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
</div>

<!-- VIEW: HOME -->
<div id="view-home" class="view active">
  <!-- INPUT -->
  <div class="input-area">
    <div class="amount-row">
      <span class="amount-currency">€</span>
      <input type="number" class="amount-input mono" id="amountInput" placeholder="0.00" inputmode="decimal" step="0.01" min="0">
    </div>
    <div class="cat-grid" id="catGrid"></div>
    <div class="extras-row">
      <button type="button" class="extra-btn" id="dateBtn" onclick="toggleDatePicker()">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span id="dateBtnLabel">Oggi</span>
      </button>
      <button type="button" class="extra-btn" id="noteToggle" onclick="toggleNote()">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span>Nota</span>
      </button>
      <input type="text" class="note-input hidden" id="noteInput" placeholder="Nota opzionale..." maxlength="100">
    </div>
    <div id="datePickerRow" style="display:none;margin-top:10px">
      <input type="date" class="date-input" id="dateInput" onchange="updateDateLabel()">
    </div>
    <div class="save-row">
      <button type="button" class="save-btn" id="saveBtn" onclick="saveExpense()" disabled>Salva spesa</button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">Riepilogo</span>
      <div class="month-nav">
        <button type="button" class="month-nav-btn" onclick="changeMonth(-1)">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="month-label" id="monthLabel"></span>
        <button type="button" class="month-nav-btn" onclick="changeMonth(1)">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <div class="summary-grid" id="summaryGrid"></div>
    <div id="pieArea"></div>
  </div>

  <!-- EXPENSES LIST -->
  <div class="section" style="padding-top:0">
    <div class="section-head">
      <span class="section-title">Dettaglio</span>
    </div>
    <div id="expensesList"></div>
  </div>

  <div class="scroll-pad"></div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Impostazioni</div>
    <div id="settingsContent"></div>
  </div>
</div>

<!-- CATEGORIES MODAL -->
<div class="modal-overlay" id="catModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Gestisci Categorie</div>
    <div id="catEditContent"></div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirmDialog">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button type="button" class="confirm-btn cancel" onclick="closeConfirm()">Annulla</button>
      <button type="button" class="confirm-btn danger" id="confirmOk">Elimina</button>
    </div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button type="button" class="tab-item active" onclick="switchTab('home',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </button>
  <button type="button" class="tab-item" onclick="switchTab('home',this);document.getElementById('amountInput').focus()">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span>Aggiungi</span>
  </button>
  <button type="button" class="tab-item" onclick="openSettings()">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span>Impostazioni</span>
  </button>
</div>

var CAT_COLORS = ['#00e599','#3399ff','#ff9933','#ff4466','#aa66ff','#ff66aa','#66cccc','#cccc33','#ff6633','#6699ff','#33cc99','#ff3366'];
var CAT_EMOJIS_DEFAULT = {
  'Benzina/Auto': '\u26FD',
  'Cibo/Spesa': '\uD83D\uDED2',
  'Cene/Ristoranti': '\uD83C\uDF7D\uFE0F',
  'Abbonamenti': '\uD83D\uDCF1',
  'Casa': '\uD83C\uDFE0',
  'Altro': '\uD83D\uDCCC'
};

var state = {
  categories: null,
  transactions: {},
  selectedCat: null,
  currentMonth: new Date().getMonth(),
  currentYear: new Date().getFullYear(),
  noteVisible: false,
  datePickerVisible: false,
  confirmCallback: null
};

/* ===== UTILS ===== */
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2200);
}

function formatMoney(n) {
  return Number(n).toFixed(2).replace('.', ',');
}

function padZero(n) {
  return n < 10 ? '0' + n : '' + n;
}

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + padZero(d.getMonth() + 1) + '-' + padZero(d.getDate());
}

function formatDateDisplay(str) {
  var parts = str.split('-');
  return parts[2] + '/' + parts[1] + '/' + parts[0];
}

function formatDayHeader(str) {
  var parts = str.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  var days = ['Domenica','Luned\u00EC','Marted\u00EC','Mercoled\u00EC','Gioved\u00EC','Venerd\u00EC','Sabato'];
  var today = todayStr();
  var yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  var yStr = yesterday.getFullYear() + '-' + padZero(yesterday.getMonth() + 1) + '-' + padZero(yesterday.getDate());
  if (str === today) return 'Oggi';
  if (str === yStr) return 'Ieri';
  return days[d.getDay()] + ' ' + parseInt(parts[2]) + ' ' + MONTH_NAMES[parseInt(parts[1]) - 1].substring(0, 3);
}

function getCatEmoji(name) {
  if (state.categories) {
    for (var i = 0; i < state.categories.length; i++) {
      if (state.categories[i].name === name && state.categories[i].emoji) {
        return state.categories[i].emoji;
      }
    }
  }
  return CAT_EMOJIS_DEFAULT[name] || '\uD83D\uDCCC';
}

function getCatColor(idx) {
  return CAT_COLORS[idx % CAT_COLORS.length];
}

/* ===== CATEGORIES ===== */
function loadCategories() {
  dbRef.child('categories').on('value', function(snap) {
    var val = snap.val();
    if (val && Array.isArray(val)) {
      state.categories = val;
    } else if (!val) {
      var defaults = [
        {name: 'Benzina/Auto', emoji: '\u26FD'},
        {name: 'Cibo/Spesa', emoji: '\uD83D\uDED2'},
        {name: 'Cene/Ristoranti', emoji: '\uD83C\uDF7D\uFE0F'},
        {name: 'Abbonamenti', emoji: '\uD83D\uDCF1'},
        {name: 'Casa', emoji: '\uD83C\uDFE0'},
        {name: 'Altro', emoji: '\uD83D\uDCCC'}
      ];
      dbRef.child('categories').set(defaults);
      state.categories = defaults;
    }
    renderCatGrid();
  });
}

function renderCatGrid() {
  var grid = document.getElementById('catGrid');
  var html = '';
  if (!state.categories) return;
  for (var i = 0; i < state.categories.length; i++) {
    var c = state.categories[i];
    var isActive = state.selectedCat === c.name ? ' active' : '';
    html += '<button type="button" class="cat-btn' + isActive + '" onclick="selectCat(\'' + c.name.replace(/'/g, "\\'") + '\')">' + (c.emoji || '') + ' ' + c.name + '</button>';
  }
  grid.innerHTML = html;
  updateSaveBtn();
}

function selectCat(name) {
  state.selectedCat = (state.selectedCat === name) ? null : name;
  renderCatGrid();
}

/* ===== INPUT ===== */
function toggleNote() {
  state.noteVisible = !state.noteVisible;
  var inp = document.getElementById('noteInput');
  var btn = document.getElementById('noteToggle');
  if (state.noteVisible) {
    inp.classList.remove('hidden');
    inp.classList.add('visible');
    btn.classList.add('has-value');
    inp.focus();
  } else {
    inp.classList.add('hidden');
    inp.classList.remove('visible');
    btn.classList.remove('has-value');
    inp.value = '';
  }
}

function toggleDatePicker() {
  state.datePickerVisible = !state.datePickerVisible;
  var row = document.getElementById('datePickerRow');
  var inp = document.getElementById('dateInput');
  var btn = document.getElementById('dateBtn');
  if (state.datePickerVisible) {
    row.style.display = 'block';
    if (!inp.value) inp.value = todayStr();
    btn.classList.add('has-value');
  } else {
    row.style.display = 'none';
    inp.value = '';
    btn.classList.remove('has-value');
    document.getElementById('dateBtnLabel').textContent = 'Oggi';
  }
}

function updateDateLabel() {
  var inp = document.getElementById('dateInput');
  var label = document.getElementById('dateBtnLabel');
  if (inp.value && inp.value !== todayStr()) {
    var parts = inp.value.split('-');
    label.textContent = parts[2] + '/' + parts[1];
  } else {
    label.textContent = 'Oggi';
  }
}

function updateSaveBtn() {
  var amount = document.getElementById('amountInput').value;
  var btn = document.getElementById('saveBtn');
  btn.disabled = !(amount && parseFloat(amount) > 0 && state.selectedCat);
}

document.getElementById('amountInput').addEventListener('input', updateSaveBtn);

/* ===== SAVE ===== */
function saveExpense() {
  var amountEl = document.getElementById('amountInput');
  var noteEl = document.getElementById('noteInput');
  var dateEl = document.getElementById('dateInput');
  var amount = parseFloat(amountEl.value);
  if (!amount || amount <= 0 || !state.selectedCat) return;

  var dateVal = (dateEl.value && state.datePickerVisible) ? dateEl.value : todayStr();
  var note = noteEl.value.trim();

  var newRef = dbRef.child('transactions').push();
  var data = {
    amount: amount,
    category: state.selectedCat,
    date: dateVal,
    note: note || '',
    created: firebase.database.ServerValue.TIMESTAMP
  };

  newRef.set(data).then(function() {
    toast('Salvato \u2713  \u20AC' + formatMoney(amount));
    amountEl.value = '';
    noteEl.value = '';
    state.selectedCat = null;
    if (state.noteVisible) toggleNote();
    if (state.datePickerVisible) toggleDatePicker();
    renderCatGrid();
    updateSaveBtn();
    amountEl.focus();
  }).catch(function(err) {
    toast('Errore: ' + err.message);
  });
}

/* ===== LOAD TRANSACTIONS ===== */
function loadTransactions() {
  dbRef.child('transactions').on('value', function(snap) {
    state.transactions = snap.val() || {};
    renderMonth();
  });
}

/* ===== RENDER MONTH ===== */
function changeMonth(dir) {
  state.currentMonth += dir;
  if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; }
  if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; }
  renderMonth();
}

function getMonthTransactions(year, month) {
  var prefix = year + '-' + padZero(month + 1);
  var result = [];
  var keys = Object.keys(state.transactions);
  for (var i = 0; i < keys.length; i++) {
    var t = state.transactions[keys[i]];
    if (t.date && t.date.substring(0, 7) === prefix) {
      result.push({id: keys[i], amount: t.amount, category: t.category, date: t.date, note: t.note || '', created: t.created || 0});
    }
  }
  result.sort(function(a, b) {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return (b.created || 0) - (a.created || 0);
  });
  return result;
}

function renderMonth() {
  var y = state.currentYear;
  var m = state.currentMonth;
  document.getElementById('monthLabel').textContent = MONTH_NAMES[m] + ' ' + y;

  var txs = getMonthTransactions(y, m);
  var total = 0;
  var catTotals = {};

  for (var i = 0; i < txs.length; i++) {
    total += txs[i].amount;
    var cat = txs[i].category;
    catTotals[cat] = (catTotals[cat] || 0) + txs[i].amount;
  }

  /* Summary */
  var daysInMonth = new Date(y, m + 1, 0).getDate();
  var today = new Date();
  var daysElapsed = (y === today.getFullYear() && m === today.getMonth()) ? today.getDate() : daysInMonth;
  var avgDay = daysElapsed > 0 ? total / daysElapsed : 0;

  /* Prev month comparison */
  var pm = m - 1, py = y;
  if (pm < 0) { pm = 11; py--; }
  var prevTxs = getMonthTransactions(py, pm);
  var prevTotal = 0;
  for (var j = 0; j < prevTxs.length; j++) prevTotal += prevTxs[j].amount;
  var diff = total - prevTotal;
  var diffStr = diff >= 0 ? '+' : '';
  diffStr += formatMoney(Math.abs(diff));
  if (diff > 0) diffStr = '+' + formatMoney(diff);
  else if (diff < 0) diffStr = '-' + formatMoney(Math.abs(diff));
  else diffStr = '\u00B10,00';

  var summaryHtml = '';
  summaryHtml += '<div class="summary-card full"><div class="summary-label">Totale mese</div><div class="summary-value mono">\u20AC ' + formatMoney(total) + '</div><div class="summary-sub">' + txs.length + ' spese</div></div>';
  summaryHtml += '<div class="summary-card"><div class="summary-label">Media/giorno</div><div class="summary-value mono" style="font-size:18px">\u20AC ' + formatMoney(avgDay) + '</div></div>';
  summaryHtml += '<div class="summary-card"><div class="summary-label">vs mese prec.</div><div class="summary-value mono" style="font-size:18px;color:' + (diff > 0 ? 'var(--red)' : diff < 0 ? 'var(--accent)' : 'var(--tx2)') + '">' + diffStr + '</div></div>';
  document.getElementById('summaryGrid').innerHTML = summaryHtml;

  /* Pie chart */
  renderPie(catTotals, total);

  /* Expense list grouped by day */
  renderExpenseList(txs);
}

function renderPie(catTotals, total) {
  var area = document.getElementById('pieArea');
  var cats = Object.keys(catTotals);
  if (cats.length === 0) {
    area.innerHTML = '';
    return;
  }

  cats.sort(function(a, b) { return catTotals[b] - catTotals[a]; });

  var svgSize = 130;
  var cx = svgSize / 2, cy = svgSize / 2, r = 52;
  var svg = '<svg class="pie-svg" viewBox="0 0 ' + svgSize + ' ' + svgSize + '">';

  var startAngle = -90;
  for (var i = 0; i < cats.length; i++) {
    var pct = total > 0 ? catTotals[cats[i]] / total : 0;
    var angle = pct * 360;
    var endAngle = startAngle + angle;
    var largeArc = angle > 180 ? 1 : 0;
    var x1 = cx + r * Math.cos(startAngle * Math.PI / 180);
    var y1 = cy + r * Math.sin(startAngle * Math.PI / 180);
    var x2 = cx + r * Math.cos(endAngle * Math.PI / 180);
    var y2 = cy + r * Math.sin(endAngle * Math.PI / 180);

    if (cats.length === 1) {
      svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + getCatColor(i) + '"/>';
    } else {
      svg += '<path d="M ' + cx + ' ' + cy + ' L ' + x1.toFixed(2) + ' ' + y1.toFixed(2) + ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + x2.toFixed(2) + ' ' + y2.toFixed(2) + ' Z" fill="' + getCatColor(i) + '"/>';
    }
    startAngle = endAngle;
  }

  /* Center hole */
  svg += '<circle cx="' + cx + '" cy="' + cy + '" r="34" fill="var(--bg)"/>';
  svg += '<text x="' + cx + '" y="' + (cy + 1) + '" text-anchor="middle" dominant-baseline="middle" fill="var(--tx)" font-family="JetBrains Mono" font-size="11" font-weight="700">' + cats.length + ' cat.</text>';
  svg += '</svg>';

  var legend = '<div class="pie-legend">';
  for (var j = 0; j < cats.length; j++) {
    var pctVal = total > 0 ? Math.round(catTotals[cats[j]] / total * 100) : 0;
    legend += '<div class="pie-legend-item">';
    legend += '<div class="pie-dot" style="background:' + getCatColor(j) + '"></div>';
    legend += '<span class="pie-legend-label">' + cats[j] + '</span>';
    legend += '<span class="pie-legend-val">\u20AC' + formatMoney(catTotals[cats[j]]) + ' (' + pctVal + '%)</span>';
    legend += '</div>';
  }
  legend += '</div>';

  area.innerHTML = '<div class="pie-wrap">' + svg + legend + '</div>';
}

function renderExpenseList(txs) {
  var list = document.getElementById('expensesList');
  if (txs.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">\uD83D\uDCB8</div><p>Nessuna spesa questo mese.<br>Inserisci la prima qui sopra!</p></div>';
    return;
  }

  var groups = {};
  var dayOrder = [];
  for (var i = 0; i < txs.length; i++) {
    var d = txs[i].date;
    if (!groups[d]) { groups[d] = []; dayOrder.push(d); }
    groups[d].push(txs[i]);
  }

  var html = '';
  for (var g = 0; g < dayOrder.length; g++) {
    var day = dayOrder[g];
    var items = groups[day];
    var dayTotal = 0;
    for (var k = 0; k < items.length; k++) dayTotal += items[k].amount;

    html += '<div class="day-group">';
    html += '<div class="day-header"><span class="day-date">' + formatDayHeader(day) + '</span><span class="day-total">\u20AC ' + formatMoney(dayTotal) + '</span></div>';

    for (var t = 0; t < items.length; t++) {
      var tx = items[t];
      var catIdx = 0;
      if (state.categories) {
        for (var ci = 0; ci < state.categories.length; ci++) {
          if (state.categories[ci].name === tx.category) { catIdx = ci; break; }
        }
      }
      html += '<div class="exp-item">';
      html += '<div class="exp-cat-dot" style="background:' + getCatColor(catIdx) + '22;color:' + getCatColor(catIdx) + '">' + getCatEmoji(tx.category) + '</div>';
      html += '<div class="exp-info"><div class="exp-cat-name">' + tx.category + '</div>';
      if (tx.note) html += '<div class="exp-note">' + tx.note + '</div>';
      html += '</div>';
      html += '<div class="exp-amount">\u20AC' + formatMoney(tx.amount) + '</div>';
      html += '<button type="button" class="exp-delete" onclick="deleteExpense(\'' + tx.id + '\')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
      html += '</div>';
    }
    html += '</div>';
  }
  list.innerHTML = html;
}

/* ===== DELETE ===== */
function deleteExpense(id) {
  showConfirm('Eliminare questa spesa?', function() {
    dbRef.child('transactions').child(id).remove().then(function() {
      toast('Eliminata \u2713');
    });
  });
}

/* ===== CONFIRM DIALOG ===== */
function showConfirm(msg, callback) {
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmDialog').classList.add('show');
  state.confirmCallback = callback;
  document.getElementById('confirmOk').onclick = function() {
    closeConfirm();
    if (state.confirmCallback) state.confirmCallback();
  };
}

function closeConfirm() {
  document.getElementById('confirmDialog').classList.remove('show');
  state.confirmCallback = null;
}

/* ===== SETTINGS ===== */
function openSettings() {
  var html = '';

  /* Categories */
  html += '<div class="setting-group">';
  html += '<div class="setting-label">Categorie</div>';
  html += '<div class="setting-item"><div><div class="setting-item-text">Gestisci categorie</div><div class="setting-item-sub">Aggiungi, modifica, rimuovi</div></div>';
  html += '<button type="button" class="setting-action" onclick="openCatEditor()">Modifica</button></div>';
  html += '</div>';

  /* Export */
  html += '<div class="setting-group">';
  html += '<div class="setting-label">Backup</div>';
  html += '<div class="setting-item"><div><div class="setting-item-text">Esporta JSON</div><div class="setting-item-sub">Backup completo su file</div></div>';
  html += '<button type="button" class="setting-action" onclick="exportData()">Esporta</button></div>';
  html += '<div class="setting-item"><div><div class="setting-item-text">Importa JSON</div><div class="setting-item-sub">Ripristina da backup</div></div>';
  html += '<button type="button" class="setting-action" onclick="triggerImport()">Importa</button></div>';
  html += '</div>';

  /* Danger */
  html += '<div class="setting-group">';
  html += '<div class="setting-label">Zona pericolosa</div>';
  html += '<div class="setting-item"><div><div class="setting-item-text">Cancella tutto</div><div class="setting-item-sub">Elimina tutte le spese</div></div>';
  html += '<button type="button" class="setting-action red" onclick="deleteAll()">Cancella</button></div>';
  html += '</div>';

  /* Hidden file input */
  html += '<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">';

  document.getElementById('settingsContent').innerHTML = html;
  document.getElementById('settingsModal').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}

/* Close modals on overlay tap */
document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

/* ===== CATEGORY EDITOR ===== */
function openCatEditor() {
  closeSettings();
  renderCatEditor();
  document.getElementById('catModal').classList.add('show');
}

function closeCatEditor() {
  document.getElementById('catModal').classList.remove('show');
}

document.getElementById('catModal').addEventListener('click', function(e) {
  if (e.target === this) closeCatEditor();
});

function renderCatEditor() {
  var html = '<div class="cat-edit-list">';
  if (state.categories) {
    for (var i = 0; i < state.categories.length; i++) {
      var c = state.categories[i];
      html += '<div class="cat-edit-item">';
      html += '<span class="cat-edit-emoji">' + (c.emoji || '\uD83D\uDCCC') + '</span>';
      html += '<span class="cat-edit-name">' + c.name + '</span>';
      html += '<button type="button" class="cat-edit-del" onclick="removeCat(' + i + ')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
      html += '</div>';
    }
  }
  html += '</div>';

  html += '<div class="cat-add-row">';
  html += '<input type="text" class="cat-add-emoji" id="newCatEmoji" placeholder="\uD83C\uDFAF" maxlength="4">';
  html += '<input type="text" class="cat-add-input" id="newCatName" placeholder="Nome categoria...">';
  html += '<button type="button" class="cat-add-btn" onclick="addCat()">+</button>';
  html += '</div>';

  document.getElementById('catEditContent').innerHTML = html;
}

function addCat() {
  var nameEl = document.getElementById('newCatName');
  var emojiEl = document.getElementById('newCatEmoji');
  var name = nameEl.value.trim();
  var emoji = emojiEl.value.trim() || '\uD83D\uDCCC';
  if (!name) return;

  if (!state.categories) state.categories = [];
  state.categories.push({name: name, emoji: emoji});
  dbRef.child('categories').set(state.categories);
  renderCatEditor();
  toast('Categoria aggiunta \u2713');
}

function removeCat(idx) {
  showConfirm('Rimuovere "' + state.categories[idx].name + '"?', function() {
    state.categories.splice(idx, 1);
    dbRef.child('categories').set(state.categories);
    renderCatEditor();
    toast('Rimossa \u2713');
  });
}

/* ===== EXPORT / IMPORT ===== */
function exportData() {
  dbRef.once('value').then(function(snap) {
    var data = snap.val() || {};
    var json = JSON.stringify(data, null, 2);
    var blob = new Blob([json], {type: 'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'cashflow_backup_' + todayStr() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Backup esportato \u2713');
    closeSettings();
  });
}

function triggerImport() {
  document.getElementById('importFile').click();
}

function importData(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      showConfirm('Sovrascrivere i dati attuali con il backup?', function() {
        dbRef.set(data).then(function() {
          toast('Importato \u2713');
          closeSettings();
        });
      });
    } catch (err) {
      toast('File JSON non valido');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function deleteAll() {
  showConfirm('Eliminare TUTTE le spese? Azione irreversibile.', function() {
    dbRef.child('transactions').remove().then(function() {
      toast('Tutto cancellato \u2713');
      closeSettings();
    });
  });
}

/* ===== TABS ===== */
function switchTab(view, el) {
  var tabs = document.querySelectorAll('.tab-item');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  if (el) el.classList.add('active');
}

/* ===== INIT ===== */
function init() {
  document.getElementById('dateInput').value = todayStr();
  loadCategories();
  loadTransactions();
  updateSaveBtn();

  /* Focus amount on load */
  setTimeout(function() {
    document.getElementById('amountInput').focus();
  }, 300);
}

init();

/* PWA Register */
if ('serviceWorker' in navigator) {
  /* Minimal - no SW file needed for basic PWA add-to-homescreen */
}
</script>
