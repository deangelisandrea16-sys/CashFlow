<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0b">
<link rel="manifest" href="manifest.json">
<title>CashFlow_</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#050506;--bg1:#0c0c0e;--bg2:#131316;--bg3:#1a1a1f;--bg4:#242429;
--glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);--glass3:rgba(255,255,255,0.10);
--glass-border:rgba(255,255,255,0.08);--glass-border2:rgba(255,255,255,0.12);
--tx:#f5f5f7;--tx2:#98989f;--tx3:#636369;--tx4:#3a3a3f;
--green:#30d158;--green-dim:rgba(48,209,88,0.12);--green-mid:rgba(48,209,88,0.25);
--red:#ff453a;--red-dim:rgba(255,69,58,0.12);
--orange:#ff9f0a;--orange-dim:rgba(255,159,10,0.12);
--blue:#0a84ff;--blue-dim:rgba(10,132,255,0.12);
--purple:#bf5af2;--teal:#64d2ff;--pink:#ff375f;--yellow:#ffd60a;--indigo:#5e5ce6;
--r:16px;--r-sm:12px;--r-lg:20px;--r-xl:24px;
--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
--header-h:56px;--tab-h:52px;
}
html{background:var(--bg);-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
body{
font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
color:var(--tx);background:var(--bg);
min-height:100vh;min-height:100dvh;
overscroll-behavior-y:none;-webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',monospace}
input,button,textarea,select{font-family:inherit;border:none;outline:none;background:none;color:inherit}
button{cursor:pointer;-webkit-appearance:none;-webkit-tap-highlight-color:transparent}

.app{padding-top:calc(var(--header-h) + var(--safe-t));padding-bottom:calc(var(--tab-h) + var(--safe-b) + 20px)}

/* TOAST */
#toast{
position:fixed;top:calc(16px + var(--safe-t));left:50%;z-index:9999;
transform:translateX(-50%) translateY(-120px) scale(0.9);
background:rgba(48,209,88,0.18);color:var(--green);
border:1px solid rgba(48,209,88,0.25);
backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
padding:11px 22px;border-radius:50px;
font-weight:600;font-size:13px;letter-spacing:-0.2px;
transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);
pointer-events:none;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0) scale(1)}
#toast.err{background:rgba(255,69,58,0.18);color:var(--red);border-color:rgba(255,69,58,0.25)}

/* HEADER */
.header{
position:fixed;top:0;left:0;right:0;z-index:500;
height:calc(var(--header-h) + var(--safe-t));padding:0 20px;padding-top:var(--safe-t);
display:flex;align-items:center;justify-content:space-between;
background:rgba(5,5,6,0.72);
backdrop-filter:saturate(180%) blur(40px);-webkit-backdrop-filter:saturate(180%) blur(40px);
border-bottom:0.5px solid var(--glass-border);
}
.logo{font-size:19px;font-weight:700;letter-spacing:-0.5px}
.logo span{color:var(--green)}
.h-btn{
width:34px;height:34px;border-radius:50%;background:var(--glass2);
display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.h-btn:active{transform:scale(0.9);background:var(--glass3)}
.h-btn svg{width:17px;height:17px;stroke:var(--tx2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* TAB BAR */
.tab-bar{
position:fixed;bottom:0;left:0;right:0;z-index:500;
height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);
display:flex;
background:rgba(5,5,6,0.72);
backdrop-filter:saturate(180%) blur(40px);-webkit-backdrop-filter:saturate(180%) blur(40px);
border-top:0.5px solid var(--glass-border);
}
.tab{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:3px;color:var(--tx3);font-size:10px;font-weight:500;transition:color 0.25s;position:relative;
}
.tab.on{color:var(--green)}
.tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:all 0.25s}
.tab.on svg{stroke-width:2}
.tab-dot{position:absolute;top:4px;width:4px;height:4px;border-radius:50%;background:var(--green);opacity:0;transition:opacity 0.3s}
.tab.on .tab-dot{opacity:1}

/* VIEWS */
.vw{display:none;opacity:0;transform:translateY(6px);transition:opacity 0.35s ease,transform 0.35s ease}
.vw.on{display:block;opacity:1;transform:translateY(0)}

/* INPUT SECTION */
.input-sec{
padding:20px;
background:linear-gradient(180deg,rgba(48,209,88,0.03) 0%,transparent 100%);
}
.amt-wrap{display:flex;align-items:baseline;gap:6px;padding:12px 0 18px}
.amt-sym{font-size:28px;font-weight:600;color:var(--tx3);font-family:'JetBrains Mono',monospace}
.amt-fld{
flex:1;font-size:44px;font-weight:700;font-family:'JetBrains Mono',monospace;
caret-color:var(--green);letter-spacing:-2px;background:transparent;
}
.amt-fld::placeholder{color:var(--tx4)}
.amt-fld::-webkit-outer-spin-button,.amt-fld::-webkit-inner-spin-button{-webkit-appearance:none}
.amt-fld[type=number]{-moz-appearance:textfield}

.qrow{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.qrow::-webkit-scrollbar{display:none}
.qb{
padding:7px 14px;border-radius:50px;font-size:13px;font-weight:600;
font-family:'JetBrains Mono',monospace;
background:var(--glass);border:0.5px solid var(--glass-border);color:var(--tx2);
white-space:nowrap;flex-shrink:0;transition:all 0.2s;
}
.qb:active{transform:scale(0.93);background:var(--green-dim);color:var(--green);border-color:rgba(48,209,88,0.3)}

.cscroll{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px 0;margin-bottom:14px}
.cscroll::-webkit-scrollbar{display:none}
.cc{
display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:50px;
font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;
background:var(--glass);border:1.5px solid transparent;color:var(--tx2);
transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.cc:active{transform:scale(0.93)}
.cc.on{background:var(--green-dim);color:var(--green);border-color:rgba(48,209,88,0.35);box-shadow:0 0 20px rgba(48,209,88,0.08)}

.extras{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.xb{
display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--r-sm);
background:var(--glass);border:0.5px solid var(--glass-border);
color:var(--tx3);font-size:12px;font-weight:500;transition:all 0.2s;
}
.xb:active{transform:scale(0.95)}
.xb svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.xb.lit{color:var(--green);background:var(--green-dim);border-color:rgba(48,209,88,0.2)}
.nf{flex:1;min-width:120px;padding:8px 14px;border-radius:var(--r-sm);background:var(--glass);border:0.5px solid var(--glass-border);font-size:13px;display:none}
.nf.open{display:block}
.nf::placeholder{color:var(--tx4)}
.dr{margin-top:10px;display:none}
.dr.open{display:block}
.df{padding:9px 14px;border-radius:var(--r-sm);background:var(--glass);border:0.5px solid var(--glass-border);font-family:'JetBrains Mono',monospace;font-size:13px;color-scheme:dark}

.save-w{margin-top:16px}
.sv{
width:100%;padding:15px;border-radius:var(--r);
background:var(--green);color:#000;
font-size:16px;font-weight:700;letter-spacing:-0.3px;
transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.sv:active{transform:scale(0.97)}
.sv:disabled{opacity:0.25;transform:none}

/* SECTIONS */
.sec{padding:0 20px;margin-bottom:24px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.st{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:1.2px}

.mn{display:flex;align-items:center;gap:10px}
.mnb{width:30px;height:30px;border-radius:50%;background:var(--glass2);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.mnb:active{transform:scale(0.88);background:var(--glass3)}
.mnb svg{width:14px;height:14px;stroke:var(--tx2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ml{font-size:14px;font-weight:600;min-width:130px;text-align:center;letter-spacing:-0.3px}

/* SUMMARY */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.sc{background:var(--glass);border:0.5px solid var(--glass-border);border-radius:var(--r);padding:16px}
.sc.w{grid-column:1/-1}
.sl{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.sv2{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.ss{font-size:10px;color:var(--tx3);margin-top:4px;font-family:'JetBrains Mono',monospace}

/* BUDGET BARS */
.bl{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.bi{background:var(--glass);border:0.5px solid var(--glass-border);border-radius:var(--r-sm);padding:14px}
.bt{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bc{display:flex;align-items:center;gap:8px}
.be2{font-size:16px}
.bn{font-size:13px;font-weight:500}
.bnum{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--tx2)}
.btrack{height:4px;border-radius:2px;background:var(--glass2);overflow:hidden}
.bfill{height:100%;border-radius:2px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1)}

/* PIE */
.pie-sec{display:flex;align-items:center;gap:18px;margin-bottom:16px}
.pie-s{width:120px;height:120px;flex-shrink:0;filter:drop-shadow(0 4px 20px rgba(48,209,88,0.08))}
.pie-l{flex:1;display:flex;flex-direction:column;gap:7px}
.pie-r{display:flex;align-items:center;gap:8px;font-size:12px}
.pie-d{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pie-c{flex:1;color:var(--tx2);font-weight:400}
.pie-v{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px}

/* CALENDAR */
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.ch{font-size:9px;font-weight:600;color:var(--tx4);text-align:center;padding:4px 0;text-transform:uppercase}
.cd{
aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;
font-size:11px;font-weight:500;color:var(--tx3);position:relative;transition:all 0.2s;
}
.cd.has{color:var(--tx);background:var(--glass)}
.cd.tod{color:var(--green);font-weight:700}
.cd.tod::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.cd .ca{font-size:6px;font-family:'JetBrains Mono',monospace;color:var(--tx3);margin-top:1px}
.cd.emp{opacity:0}

/* SEARCH */
.sbar{
display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--r);
background:var(--glass);border:0.5px solid var(--glass-border);margin-bottom:16px;
}
.sbar svg{width:16px;height:16px;stroke:var(--tx3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sinp{flex:1;font-size:14px;background:transparent}
.sinp::placeholder{color:var(--tx4)}
.sclr{width:20px;height:20px;border-radius:50%;background:var(--glass2);display:none;align-items:center;justify-content:center}
.sclr.vis{display:flex}
.sclr svg{width:12px;height:12px;stroke:var(--tx3)}
.fc{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;padding-bottom:2px}
.fc::-webkit-scrollbar{display:none}
.fp{
padding:6px 12px;border-radius:50px;font-size:11px;font-weight:500;
background:var(--glass);border:1px solid transparent;color:var(--tx3);
white-space:nowrap;flex-shrink:0;transition:all 0.2s;
}
.fp.on{background:var(--green-dim);color:var(--green);border-color:rgba(48,209,88,0.3)}
.fp:active{transform:scale(0.93)}

/* DAY GROUPS */
.dg{margin-bottom:16px;animation:fsi 0.3s ease both}
@keyframes fsi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.dh{display:flex;align-items:center;justify-content:space-between;padding:6px 0;margin-bottom:6px}
.dd{font-size:12px;font-weight:600;color:var(--tx2)}
.dtt{font-size:12px;font-weight:600;color:var(--tx3);font-family:'JetBrains Mono',monospace}

/* SWIPE EXPENSE */
.esw{position:relative;overflow:hidden;border-radius:var(--r-sm);margin-bottom:4px}
.esbg{
position:absolute;right:0;top:0;bottom:0;width:90px;
background:var(--red);display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);
}
.esbg svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ec{
display:flex;align-items:center;gap:12px;padding:12px 14px;
background:var(--bg2);border:0.5px solid var(--glass-border);border-radius:var(--r-sm);
position:relative;z-index:1;transition:transform 0.3s cubic-bezier(0.25,0.8,0.25,1);touch-action:pan-y;
}
.ec.swp{transition:none}
.ei{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ef{flex:1;min-width:0}
.en{font-size:13px;font-weight:500;letter-spacing:-0.2px}
.eno{font-size:11px;color:var(--tx3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ea{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px;flex-shrink:0}

.empty{text-align:center;padding:50px 20px;color:var(--tx3)}
.empty .eic{font-size:44px;margin-bottom:14px}
.empty p{font-size:13px;line-height:1.6}

/* ANALYTICS */
.asec{padding:20px}
.acard{background:var(--glass);border:0.5px solid var(--glass-border);border-radius:var(--r);padding:18px;margin-bottom:12px}
.atit{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px}
.bchart{display:flex;align-items:flex-end;gap:6px;height:140px;padding-top:10px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bfl{width:100%;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,var(--green),rgba(48,209,88,0.4));transition:height 0.6s cubic-bezier(0.34,1.56,0.64,1);min-height:2px}
.bfl.cur{background:linear-gradient(180deg,var(--green),rgba(48,209,88,0.7));box-shadow:0 0 12px rgba(48,209,88,0.2)}
.blb{font-size:9px;color:var(--tx3);font-weight:500}
.bvl{font-size:8px;font-family:'JetBrains Mono',monospace;color:var(--tx2);font-weight:600}
.sr{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--glass-border)}
.sr:last-child{border-bottom:none}
.srl{font-size:13px;color:var(--tx2)}
.srv{font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace}

/* SETTINGS */
.stg{margin-bottom:24px}
.stgl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-left:4px}
.stgi{
display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
background:var(--glass);border:0.5px solid var(--glass-border);margin-bottom:1px;
}
.stgi:first-of-type{border-radius:var(--r) var(--r) 0 0}
.stgi:last-of-type{border-radius:0 0 var(--r) var(--r);margin-bottom:0}
.stgi:only-of-type{border-radius:var(--r)}
.stil{flex:1}
.stit{font-size:14px;font-weight:500}
.stis{font-size:11px;color:var(--tx3);margin-top:2px}
.sta{padding:6px 14px;border-radius:50px;font-size:12px;font-weight:600;background:var(--green-dim);color:var(--green);transition:all 0.2s}
.sta:active{transform:scale(0.93)}
.sta.red{background:var(--red-dim);color:var(--red)}

/* MODALS */
.mo{
position:fixed;inset:0;z-index:600;background:rgba(0,0,0,0);
display:none;align-items:flex-end;justify-content:center;transition:background 0.3s;
}
.mo.show{display:flex;background:rgba(0,0,0,0.5)}
.ms{
background:var(--bg2);border:0.5px solid var(--glass-border);
border-radius:var(--r-xl) var(--r-xl) 0 0;
width:100%;max-width:500px;max-height:82vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
padding:20px;padding-bottom:calc(24px + var(--safe-b));
transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);
}
.mo.show .ms{transform:translateY(0)}
.mh{width:36px;height:4px;border-radius:2px;background:var(--tx4);margin:0 auto 18px}
.mt{font-size:18px;font-weight:700;margin-bottom:18px;letter-spacing:-0.3px}

/* Modal cat edit */
.cel{display:flex;flex-direction:column;gap:4px;margin-bottom:16px}
.cei{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--glass);border:0.5px solid var(--glass-border);border-radius:var(--r-sm)}
.cee{font-size:18px;width:28px;text-align:center}
.cen2{flex:1;font-size:14px;font-weight:500}
.ced{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.ced:active{background:var(--red-dim)}
.ced svg{width:14px;height:14px;stroke:var(--red);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cear{display:flex;gap:6px;margin-top:12px}
.ceae{width:44px;padding:10px;border-radius:var(--r-sm);background:var(--glass);border:0.5px solid var(--glass-border);font-size:18px;text-align:center}
.cean{flex:1;padding:10px 14px;border-radius:var(--r-sm);background:var(--glass);border:0.5px solid var(--glass-border);font-size:14px}
.cean::placeholder{color:var(--tx4)}
.ceab{padding:10px 16px;border-radius:var(--r-sm);background:var(--green);color:#000;font-weight:700;font-size:13px}
.ceab:active{opacity:0.7}

/* Budget edit */
.bei{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--glass);border:0.5px solid var(--glass-border);border-radius:var(--r-sm);margin-bottom:4px}
.bee{font-size:16px;width:24px;text-align:center}
.ben{flex:1;font-size:13px;font-weight:500}
.bein{width:90px;padding:8px 10px;border-radius:8px;background:var(--glass2);border:0.5px solid var(--glass-border);font-family:'JetBrains Mono',monospace;font-size:13px;text-align:right}
.bein::placeholder{color:var(--tx4)}

/* Recurring edit */
.ref{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.rer{display:flex;gap:8px}
.rei{flex:1;padding:10px 14px;border-radius:var(--r-sm);background:var(--glass);border:0.5px solid var(--glass-border);font-size:14px}
.rei::placeholder{color:var(--tx4)}
.res{padding:10px 14px;border-radius:var(--r-sm);background:var(--glass);border:0.5px solid var(--glass-border);font-size:14px;color:var(--tx)}
.rci{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--glass);border:0.5px solid var(--glass-border);border-radius:var(--r-sm);margin-bottom:4px}
.rcii{flex:1}
.rcin{font-size:13px;font-weight:500}
.rcis{font-size:11px;color:var(--tx3);margin-top:1px}
.rcia{font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace}

/* CONFIRM */
.cov{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,0);display:none;align-items:center;justify-content:center;padding:24px;transition:background 0.3s}
.cov.show{display:flex;background:rgba(0,0,0,0.6)}
.cbx{background:var(--bg2);border:0.5px solid var(--glass-border);border-radius:var(--r);padding:24px;max-width:300px;width:100%;text-align:center;transform:scale(0.9);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.cov.show .cbx{transform:scale(1);opacity:1}
.cmsg{font-size:15px;line-height:1.5;margin-bottom:20px}
.cbtns{display:flex;gap:8px}
.cb{flex:1;padding:12px;border-radius:var(--r-sm);font-weight:600;font-size:14px;transition:all 0.2s}
.cb:active{transform:scale(0.95)}
.cb.ccl{background:var(--glass2);color:var(--tx2)}
.cb.cdg{background:var(--red);color:#fff}

.spad{height:30px}
</style>
</head>
<body>
<div id="toast"></div>

<div class="header">
  <div class="logo">CashFlow<span>_</span></div>
  <button type="button" class="h-btn" id="sTog" onclick="togSearch()">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
</div>

<!-- HOME -->
<div id="v-home" class="vw on">
  <div class="input-sec">
    <div class="amt-wrap"><span class="amt-sym">\u20AC</span><input type="number" class="amt-fld" id="iAmt" placeholder="0,00" inputmode="decimal" step="0.01" min="0"></div>
    <div class="qrow" id="qRow"></div>
    <div class="cscroll" id="cScroll"></div>
    <div class="extras">
      <button type="button" class="xb" id="bDate" onclick="togDate()"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span id="dLbl">Oggi</span></button>
      <button type="button" class="xb" id="bNote" onclick="togNote()"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Nota</button>
      <input type="text" class="nf" id="iNote" placeholder="Nota opzionale..." maxlength="100">
    </div>
    <div class="dr" id="dRow"><input type="date" class="df" id="iDate" onchange="updDLbl()"></div>
    <div class="save-w"><button type="button" class="sv" id="sBtn" onclick="saveExp()" disabled>Salva spesa</button></div>
  </div>

  <div class="sec" id="sSec" style="display:none">
    <div class="sbar"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" class="sinp" id="iSearch" placeholder="Cerca spese..." oninput="doSrch()"><button type="button" class="sclr" id="sClr" onclick="clrSrch()"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="fc" id="fChips"></div>
  </div>

  <div class="sec">
    <div class="sh"><span class="st">Riepilogo</span>
      <div class="mn"><button type="button" class="mnb" onclick="chgM(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button><span class="ml" id="mLbl"></span><button type="button" class="mnb" onclick="chgM(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button></div>
    </div>
    <div class="sg" id="sGrid"></div>
    <div id="budArea"></div>
    <div id="pieA"></div>
    <div id="calA"></div>
  </div>

  <div class="sec" style="padding-top:0"><div class="sh"><span class="st">Dettaglio</span></div><div id="eList"></div></div>
  <div class="spad"></div>
</div>

<!-- ANALYTICS -->
<div id="v-analytics" class="vw"><div class="asec" id="aContent"></div><div class="spad"></div></div>

<!-- SETTINGS -->
<div id="v-settings" class="vw"><div class="sec" style="padding-top:20px" id="sContent"></div><div class="spad"></div></div>

<!-- MODALS -->
<div class="mo" id="mo-c"><div class="ms"><div class="mh"></div><div class="mt">Categorie</div><div id="ceC"></div></div></div>
<div class="mo" id="mo-b"><div class="ms"><div class="mh"></div><div class="mt">Budget Mensile</div><div id="beC"></div></div></div>
<div class="mo" id="mo-r"><div class="ms"><div class="mh"></div><div class="mt">Spese Ricorrenti</div><div id="rcC"></div></div></div>

<div class="cov" id="cfOv"><div class="cbx"><div class="cmsg" id="cfMsg"></div><div class="cbtns"><button type="button" class="cb ccl" onclick="clCfm()">Annulla</button><button type="button" class="cb cdg" id="cfOk">Elimina</button></div></div></div>

<div class="tab-bar">
  <button type="button" class="tab on" onclick="goTab('home',this)"><div class="tab-dot"></div><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</button>
  <button type="button" class="tab" onclick="goTab('home',this);document.getElementById('iAmt').focus()"><div class="tab-dot"></div><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Aggiungi</button>
  <button type="button" class="tab" onclick="goTab('analytics',this)"><div class="tab-dot"></div><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analisi</button>
  <button type="button" class="tab" onclick="goTab('settings',this)"><div class="tab-dot"></div><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Altro</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
var FB=firebase.initializeApp({apiKey:"AIzaSyCs7Gpx9uZk3Zr_UOGbyfa_EL9MjfSrVUE",authDomain:"andreaos-a7a3b.firebaseapp.com",databaseURL:"https://andreaos-a7a3b-default-rtdb.europe-west1.firebasedatabase.app",projectId:"andreaos-a7a3b",storageBucket:"andreaos-a7a3b.firebasestorage.app",messagingSenderId:"518638530790",appId:"1:518638530790:web:c905ec955c932c019bcb27"});
var db=firebase.database();var R=db.ref('personal_expenses');

var MN=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
var MS=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
var DS=['L','M','M','G','V','S','D'];
var CL=['#30d158','#0a84ff','#ff9f0a','#ff453a','#bf5af2','#ff375f','#64d2ff','#ffd60a','#5e5ce6','#ac8e68','#30b0c7','#ff6482'];
var QA=[5,10,20,30,50,100];
var DC=[{name:'Benzina/Auto',emoji:'\u26FD'},{name:'Cibo/Spesa',emoji:'\uD83D\uDED2'},{name:'Cene/Ristoranti',emoji:'\uD83C\uDF7D\uFE0F'},{name:'Abbonamenti',emoji:'\uD83D\uDCF1'},{name:'Casa',emoji:'\uD83C\uDFE0'},{name:'Altro',emoji:'\uD83D\uDCCC'}];

var S={cats:null,txs:{},bud:{},rec:[],selC:null,cM:new Date().getMonth(),cY:new Date().getFullYear(),noteOn:false,dateOn:false,srchOn:false,srchQ:'',fCat:null,cfCb:null};

function toast(m,e){var t=document.getElementById('toast');t.textContent=m;t.className=e?'err':'';t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200)}
function fmt(n){return Number(n).toFixed(2).replace('.',',')}
function pz(n){return n<10?'0'+n:''+n}
function td(){var d=new Date();return d.getFullYear()+'-'+pz(d.getMonth()+1)+'-'+pz(d.getDate())}
function cc(i){return CL[i%CL.length]}
function ce(n){if(S.cats){for(var i=0;i<S.cats.length;i++){if(S.cats[i].name===n)return S.cats[i].emoji||'\uD83D\uDCCC'}}return'\uD83D\uDCCC'}
function ci(n){if(S.cats){for(var i=0;i<S.cats.length;i++){if(S.cats[i].name===n)return i}}return 0}
function dl(ds){var p=ds.split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);var nm=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];var t=td();var y=new Date();y.setDate(y.getDate()-1);var ys=y.getFullYear()+'-'+pz(y.getMonth()+1)+'-'+pz(y.getDate());if(ds===t)return'Oggi';if(ds===ys)return'Ieri';return nm[d.getDay()]+' '+parseInt(p[2])+' '+MS[+p[1]-1]}

function goTab(id,el){
  var vs=document.querySelectorAll('.vw');for(var i=0;i<vs.length;i++)vs[i].classList.remove('on');
  document.getElementById('v-'+id).classList.add('on');
  var ts=document.querySelectorAll('.tab');for(var j=0;j<ts.length;j++)ts[j].classList.remove('on');
  if(el)el.classList.add('on');
  if(id==='analytics')rAnalytics();if(id==='settings')rSettings();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showCfm(m,cb){document.getElementById('cfMsg').textContent=m;document.getElementById('cfOv').classList.add('show');S.cfCb=cb;document.getElementById('cfOk').onclick=function(){clCfm();if(S.cfCb)S.cfCb()}}
function clCfm(){document.getElementById('cfOv').classList.remove('show');S.cfCb=null}
function oM(id){document.getElementById(id).classList.add('show')}
function cM(id){document.getElementById(id).classList.remove('show')}
document.getElementById('mo-c').addEventListener('click',function(e){if(e.target===this)cM('mo-c')});
document.getElementById('mo-b').addEventListener('click',function(e){if(e.target===this)cM('mo-b')});
document.getElementById('mo-r').addEventListener('click',function(e){if(e.target===this)cM('mo-r')});

function ldCats(){R.child('categories').on('value',function(sn){var v=sn.val();if(v&&Array.isArray(v))S.cats=v;else if(!v){R.child('categories').set(DC);S.cats=DC.slice()}rCats()})}
function rCats(){var h='';if(!S.cats)return;for(var i=0;i<S.cats.length;i++){var c=S.cats[i];var on=S.selC===c.name?' on':'';h+='<button type="button" class="cc'+on+'" onclick="pCat(\''+c.name.replace(/'/g,"\\'")+'\')">'+(c.emoji||'')+' '+c.name+'</button>'}document.getElementById('cScroll').innerHTML=h;uSv()}
function pCat(n){S.selC=(S.selC===n)?null:n;rCats()}

function rQuick(){var h='';for(var i=0;i<QA.length;i++)h+='<button type="button" class="qb" onclick="sAmt('+QA[i]+')">\u20AC'+QA[i]+'</button>';document.getElementById('qRow').innerHTML=h}
function sAmt(v){document.getElementById('iAmt').value=v;uSv();document.getElementById('iAmt').focus()}

function togNote(){S.noteOn=!S.noteOn;var f=document.getElementById('iNote');var b=document.getElementById('bNote');if(S.noteOn){f.classList.add('open');b.classList.add('lit');f.focus()}else{f.classList.remove('open');b.classList.remove('lit');f.value=''}}
function togDate(){S.dateOn=!S.dateOn;var r=document.getElementById('dRow');var inp=document.getElementById('iDate');var b=document.getElementById('bDate');if(S.dateOn){r.classList.add('open');if(!inp.value)inp.value=td();b.classList.add('lit')}else{r.classList.remove('open');inp.value='';b.classList.remove('lit');document.getElementById('dLbl').textContent='Oggi'}}
function updDLbl(){var v=document.getElementById('iDate').value;var l=document.getElementById('dLbl');if(v&&v!==td()){var p=v.split('-');l.textContent=p[2]+'/'+p[1]}else l.textContent='Oggi'}
function uSv(){var a=document.getElementById('iAmt').value;document.getElementById('sBtn').disabled=!(a&&parseFloat(a)>0&&S.selC)}
document.getElementById('iAmt').addEventListener('input',uSv);

function togSearch(){S.srchOn=!S.srchOn;var s=document.getElementById('sSec');var b=document.getElementById('sTog');if(S.srchOn){s.style.display='block';b.querySelector('svg').style.stroke='var(--green)';rFChips();document.getElementById('iSearch').focus()}else{s.style.display='none';b.querySelector('svg').style.stroke='';S.srchQ='';S.fCat=null;document.getElementById('iSearch').value='';rMonth()}}
function doSrch(){S.srchQ=document.getElementById('iSearch').value.toLowerCase();document.getElementById('sClr').classList.toggle('vis',S.srchQ.length>0);rMonth()}
function clrSrch(){document.getElementById('iSearch').value='';S.srchQ='';document.getElementById('sClr').classList.remove('vis');rMonth()}
function rFChips(){var h='<button type="button" class="fp'+(S.fCat===null?' on':'')+'" onclick="sFlt(null)">Tutte</button>';if(S.cats){for(var i=0;i<S.cats.length;i++){var c=S.cats[i];var on=S.fCat===c.name?' on':'';h+='<button type="button" class="fp'+on+'" onclick="sFlt(\''+c.name.replace(/'/g,"\\'")+'\')">'+(c.emoji||'')+' '+c.name+'</button>'}}document.getElementById('fChips').innerHTML=h}
function sFlt(c){S.fCat=c;rFChips();rMonth()}

function saveExp(){
  var amt=parseFloat(document.getElementById('iAmt').value);if(!amt||amt<=0||!S.selC)return;
  var dv=(document.getElementById('iDate').value&&S.dateOn)?document.getElementById('iDate').value:td();
  var note=document.getElementById('iNote').value.trim();
  R.child('transactions').push().set({amount:amt,category:S.selC,date:dv,note:note||'',created:firebase.database.ServerValue.TIMESTAMP}).then(function(){
    toast('Salvato \u2713  \u20AC'+fmt(amt));document.getElementById('iAmt').value='';document.getElementById('iNote').value='';S.selC=null;
    if(S.noteOn)togNote();if(S.dateOn)togDate();rCats();uSv();
  }).catch(function(e){toast('Errore: '+e.message,true)});
}

function ldTxs(){R.child('transactions').on('value',function(sn){S.txs=sn.val()||{};rMonth()})}
function ldBud(){R.child('budgets').on('value',function(sn){S.bud=sn.val()||{};rMonth()})}
function ldRec(){R.child('recurring').on('value',function(sn){var v=sn.val();S.rec=[];if(v){var ks=Object.keys(v);for(var i=0;i<ks.length;i++){var it=v[ks[i]];it._id=ks[i];S.rec.push(it)}}chkRec()})}
function chkRec(){
  var t=td();for(var i=0;i<S.rec.length;i++){var rc=S.rec[i];var lg=rc.lastGenerated||'';var mk=t.substring(0,7);
    if(lg.substring(0,7)!==mk&&rc.dayOfMonth){var gd=mk+'-'+pz(rc.dayOfMonth);var ex=false;var ks=Object.keys(S.txs);
      for(var j=0;j<ks.length;j++){var tx=S.txs[ks[j]];if(tx.date===gd&&tx.category===rc.category&&tx.amount===rc.amount&&tx.note==='[Ricorrente] '+rc.name)ex=true}
      if(!ex){R.child('transactions').push().set({amount:rc.amount,category:rc.category,date:gd,note:'[Ricorrente] '+rc.name,created:firebase.database.ServerValue.TIMESTAMP});R.child('recurring').child(rc._id).child('lastGenerated').set(t)}
    }
  }
}

function chgM(d){S.cM+=d;if(S.cM>11){S.cM=0;S.cY++}if(S.cM<0){S.cM=11;S.cY--}rMonth()}
function gMT(y,m){var pfx=y+'-'+pz(m+1);var a=[];var ks=Object.keys(S.txs);for(var i=0;i<ks.length;i++){var t=S.txs[ks[i]];if(t.date&&t.date.substring(0,7)===pfx)a.push({id:ks[i],amount:t.amount,category:t.category,date:t.date,note:t.note||'',created:t.created||0})}a.sort(function(a,b){if(a.date!==b.date)return b.date.localeCompare(a.date);return(b.created||0)-(a.created||0)});return a}

function rMonth(){
  var y=S.cY,m=S.cM;document.getElementById('mLbl').textContent=MN[m]+' '+y;
  var txs=gMT(y,m);var tot=0,ct={};
  for(var i=0;i<txs.length;i++){tot+=txs[i].amount;var c=txs[i].category;ct[c]=(ct[c]||0)+txs[i].amount}
  var dim=new Date(y,m+1,0).getDate();var now=new Date();var el=(y===now.getFullYear()&&m===now.getMonth())?now.getDate():dim;var avg=el>0?tot/el:0;
  var py=m===0?y-1:y,pm=m===0?11:m-1;var prev=gMT(py,pm);var pt=0;for(var j=0;j<prev.length;j++)pt+=prev[j].amount;
  var df=tot-pt;var ds=df>0?'+\u20AC'+fmt(df):df<0?'-\u20AC'+fmt(Math.abs(df)):'\u00B10,00';
  var h='<div class="sc w"><div class="sl">Totale mese</div><div class="sv2 mono">\u20AC '+fmt(tot)+'</div><div class="ss">'+txs.length+' spese</div></div>';
  h+='<div class="sc"><div class="sl">Media/giorno</div><div class="sv2 mono" style="font-size:18px">\u20AC '+fmt(avg)+'</div></div>';
  h+='<div class="sc"><div class="sl">vs mese prec.</div><div class="sv2 mono" style="font-size:18px;color:'+(df>0?'var(--red)':df<0?'var(--green)':'var(--tx2)')+'">' +ds+'</div></div>';
  document.getElementById('sGrid').innerHTML=h;
  rBudBars(ct);rPie(ct,tot);rCal(txs,y,m);rExpList(txs);
}

function rBudBars(ct){
  var a=document.getElementById('budArea');var cs=S.cats||[];var hb=false;var h='<div class="bl">';
  for(var i=0;i<cs.length;i++){var c=cs[i];var lm=S.bud[c.name];if(!lm)continue;hb=true;
    var sp=ct[c.name]||0;var pc=Math.min(sp/lm*100,100);var col=pc>=90?'var(--red)':pc>=70?'var(--orange)':'var(--green)';
    h+='<div class="bi"><div class="bt"><div class="bc"><span class="be2">'+(c.emoji||'')+'</span><span class="bn">'+c.name+'</span></div><span class="bnum">\u20AC'+fmt(sp)+' / \u20AC'+fmt(lm)+'</span></div><div class="btrack"><div class="bfill" style="width:'+pc+'%;background:'+col+'"></div></div></div>';
  }h+='</div>';a.innerHTML=hb?h:'';
}

function rPie(ct,tot){
  var a=document.getElementById('pieA');var cs=Object.keys(ct);if(!cs.length){a.innerHTML='';return}
  cs.sort(function(a,b){return ct[b]-ct[a]});var sz=120,cx2=60,cy2=60,r2=50;
  var svg='<svg class="pie-s" viewBox="0 0 '+sz+' '+sz+'">';var sa=-90;
  for(var i=0;i<cs.length;i++){var pc=tot>0?ct[cs[i]]/tot:0;var an=pc*360;var ea=sa+an;var la=an>180?1:0;
    var x1=cx2+r2*Math.cos(sa*Math.PI/180),y1=cy2+r2*Math.sin(sa*Math.PI/180);
    var x2=cx2+r2*Math.cos(ea*Math.PI/180),y2=cy2+r2*Math.sin(ea*Math.PI/180);var idx=ci(cs[i]);
    if(cs.length===1)svg+='<circle cx="'+cx2+'" cy="'+cy2+'" r="'+r2+'" fill="'+cc(idx)+'"/>';
    else svg+='<path d="M '+cx2+' '+cy2+' L '+x1.toFixed(2)+' '+y1.toFixed(2)+' A '+r2+' '+r2+' 0 '+la+' 1 '+x2.toFixed(2)+' '+y2.toFixed(2)+' Z" fill="'+cc(idx)+'"/>';
    sa=ea}
  svg+='<circle cx="'+cx2+'" cy="'+cy2+'" r="32" fill="var(--bg)"/></svg>';
  var lg='<div class="pie-l">';
  for(var j=0;j<cs.length;j++){var p2=tot>0?Math.round(ct[cs[j]]/tot*100):0;var i2=ci(cs[j]);
    lg+='<div class="pie-r"><div class="pie-d" style="background:'+cc(i2)+'"></div><span class="pie-c">'+cs[j]+'</span><span class="pie-v">\u20AC'+fmt(ct[cs[j]])+' ('+p2+'%)</span></div>'}
  lg+='</div>';a.innerHTML='<div class="pie-sec">'+svg+lg+'</div>';
}

function rCal(txs,y,m){
  var a=document.getElementById('calA');var dim=new Date(y,m+1,0).getDate();var fd=new Date(y,m,1).getDay();var off=fd===0?6:fd-1;
  var dt={};for(var i=0;i<txs.length;i++){var d=parseInt(txs[i].date.split('-')[2]);dt[d]=(dt[d]||0)+txs[i].amount}
  var now=new Date();var itm=(y===now.getFullYear()&&m===now.getMonth());
  var h='<div class="cg">';for(var d2=0;d2<7;d2++)h+='<div class="ch">'+DS[d2]+'</div>';
  for(var e=0;e<off;e++)h+='<div class="cd emp"></div>';
  for(var dy=1;dy<=dim;dy++){var cls='cd';if(dt[dy])cls+=' has';if(itm&&dy===now.getDate())cls+=' tod';
    h+='<div class="'+cls+'">'+dy;if(dt[dy])h+='<div class="ca">'+Math.round(dt[dy])+'</div>';h+='</div>'}
  h+='</div>';a.innerHTML=h;
}

function rExpList(txs){
  var ls=document.getElementById('eList');var fl=[];
  for(var i=0;i<txs.length;i++){var t=txs[i];if(S.fCat&&t.category!==S.fCat)continue;if(S.srchQ){var hy=(t.category+' '+t.note+' '+t.amount).toLowerCase();if(hy.indexOf(S.srchQ)===-1)continue}fl.push(t)}
  if(!fl.length){ls.innerHTML='<div class="empty"><div class="eic">\uD83D\uDCB8</div><p>Nessuna spesa trovata.</p></div>';return}
  var gs={},ord=[];for(var j=0;j<fl.length;j++){var d=fl[j].date;if(!gs[d]){gs[d]=[];ord.push(d)}gs[d].push(fl[j])}
  var h='';for(var g=0;g<ord.length;g++){var day=ord[g],items=gs[day],dtt=0;
    for(var k=0;k<items.length;k++)dtt+=items[k].amount;
    h+='<div class="dg"><div class="dh"><span class="dd">'+dl(day)+'</span><span class="dtt">\u20AC '+fmt(dtt)+'</span></div>';
    for(var x=0;x<items.length;x++){var tx=items[x];var idx=ci(tx.category);
      h+='<div class="esw"><div class="esbg"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>';
      h+='<div class="ec" data-id="'+tx.id+'" ontouchstart="swS(event)" ontouchmove="swM(event)" ontouchend="swE(event)">';
      h+='<div class="ei" style="background:'+cc(idx)+'18;color:'+cc(idx)+'">'+ce(tx.category)+'</div>';
      h+='<div class="ef"><div class="en">'+tx.category+'</div>';if(tx.note)h+='<div class="eno">'+tx.note+'</div>';h+='</div>';
      h+='<div class="ea">\u20AC'+fmt(tx.amount)+'</div></div></div>'}
    h+='</div>'}
  ls.innerHTML=h;
}

var sw={el:null,sx:0,dx:0,on:false};
function swS(e){sw.el=e.currentTarget;sw.sx=e.touches[0].clientX;sw.dx=0;sw.on=false}
function swM(e){if(!sw.el)return;var dx=e.touches[0].clientX-sw.sx;if(dx>0)dx=0;if(Math.abs(dx)>10)sw.on=true;if(!sw.on)return;sw.dx=dx;sw.el.classList.add('swp');sw.el.style.transform='translateX('+dx+'px)'}
function swE(){if(!sw.el)return;sw.el.classList.remove('swp');if(sw.dx<-80){var id=sw.el.getAttribute('data-id');sw.el.style.transform='translateX(-100%)';setTimeout(function(){dExp(id)},200)}else{sw.el.style.transform=''}sw.el=null;sw.dx=0;sw.on=false}
function dExp(id){showCfm('Eliminare questa spesa?',function(){R.child('transactions').child(id).remove().then(function(){toast('Eliminata \u2713')})})}

function rAnalytics(){
  var now=new Date();var cm=now.getMonth(),cy=now.getFullYear();var h='';
  h+='<div class="acard"><div class="atit">Ultimi 6 mesi</div><div class="bchart">';
  var mx=0;var md=[];
  for(var i=5;i>=0;i--){var mm=cm-i,yy=cy;while(mm<0){mm+=12;yy--}var txs=gMT(yy,mm);var tot=0;for(var j=0;j<txs.length;j++)tot+=txs[j].amount;if(tot>mx)mx=tot;md.push({m:mm,y:yy,t:tot,c:i===0})}
  for(var k=0;k<md.length;k++){var d=md[k];var pc=mx>0?d.t/mx*100:0;h+='<div class="bcol"><div class="bvl">\u20AC'+Math.round(d.t)+'</div><div class="bfl'+(d.c?' cur':'')+'" style="height:'+Math.max(pc,2)+'%"></div><div class="blb">'+MS[d.m]+'</div></div>'}
  h+='</div></div>';
  var ct2=gMT(cy,cm);var cT=0,cCt={},dC={};var dn=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  for(var m=0;m<ct2.length;m++){cT+=ct2[m].amount;var cat=ct2[m].category;cCt[cat]=(cCt[cat]||0)+ct2[m].amount;var dd=new Date(ct2[m].date.replace(/-/g,'/'));dC[dd.getDay()]=(dC[dd.getDay()]||0)+ct2[m].amount}
  var aT=ct2.length>0?cT/ct2.length:0;var tC='N/A',tA=0;var cK=Object.keys(cCt);for(var c=0;c<cK.length;c++){if(cCt[cK[c]]>tA){tA=cCt[cK[c]];tC=cK[c]}}
  var tD='N/A',tDA=0;var dK=Object.keys(dC);for(var dd2=0;dd2<dK.length;dd2++){if(dC[dK[dd2]]>tDA){tDA=dC[dK[dd2]];tD=dn[dK[dd2]]}}
  h+='<div class="acard"><div class="atit">Statistiche '+MN[cm]+'</div>';
  h+='<div class="sr"><span class="srl">Spesa media/transazione</span><span class="srv">\u20AC'+fmt(aT)+'</span></div>';
  h+='<div class="sr"><span class="srl">Categoria top</span><span class="srv">'+tC+'</span></div>';
  h+='<div class="sr"><span class="srl">Top categoria importo</span><span class="srv">\u20AC'+fmt(tA)+'</span></div>';
  h+='<div class="sr"><span class="srl">Giorno pi\u00F9 costoso</span><span class="srv">'+tD+'</span></div>';
  h+='<div class="sr"><span class="srl">Transazioni</span><span class="srv">'+ct2.length+'</span></div></div>';

  h+='<div class="acard"><div class="atit">Spesa per giorno settimana</div><div class="bchart" style="height:100px">';
  var mxD=0;for(var w=0;w<7;w++){var dv=dC[w===6?0:w+1]||0;if(dv>mxD)mxD=dv}
  var wo=[1,2,3,4,5,6,0];for(var w2=0;w2<7;w2++){var di=wo[w2];var dv2=dC[di]||0;var pp=mxD>0?dv2/mxD*100:0;
    h+='<div class="bcol"><div class="bvl">\u20AC'+Math.round(dv2)+'</div><div class="bfl" style="height:'+Math.max(pp,2)+'%"></div><div class="blb">'+dn[di]+'</div></div>'}
  h+='</div></div>';

  h+='<div class="acard"><div class="atit">Categorie vs mese prec.</div>';
  var py2=cm===0?cy-1:cy,pm2=cm===0?11:cm-1;var pTxs=gMT(py2,pm2);var pCt={};
  for(var p=0;p<pTxs.length;p++){var pc2=pTxs[p].category;pCt[pc2]=(pCt[pc2]||0)+pTxs[p].amount}
  if(S.cats){for(var ci2=0;ci2<S.cats.length;ci2++){var cn=S.cats[ci2].name;var cur=cCt[cn]||0;var prv=pCt[cn]||0;var diff=cur-prv;
    var diffS=diff>0?'+\u20AC'+fmt(diff):diff<0?'-\u20AC'+fmt(Math.abs(diff)):'\u00B10';var diffC=diff>0?'var(--red)':diff<0?'var(--green)':'var(--tx3)';
    h+='<div class="sr"><span class="srl">'+(S.cats[ci2].emoji||'')+' '+cn+'</span><span class="srv" style="color:'+diffC+'">'+diffS+'</span></div>'}}
  h+='</div>';
  document.getElementById('aContent').innerHTML=h;
}

function rSettings(){
  var h='<div class="stg"><div class="stgl">Categorie</div><div class="stgi" style="border-radius:var(--r)"><div class="stil"><div class="stit">Gestisci categorie</div><div class="stis">Aggiungi, modifica, rimuovi</div></div><button type="button" class="sta" onclick="oCatEd()">Modifica</button></div></div>';
  h+='<div class="stg"><div class="stgl">Budget</div><div class="stgi" style="border-radius:var(--r)"><div class="stil"><div class="stit">Budget mensile</div><div class="stis">Limiti per categoria</div></div><button type="button" class="sta" onclick="oBudEd()">Imposta</button></div></div>';
  h+='<div class="stg"><div class="stgl">Ricorrenti</div><div class="stgi" style="border-radius:var(--r)"><div class="stil"><div class="stit">Spese ricorrenti</div><div class="stis">Abbonamenti, affitto, bollette</div></div><button type="button" class="sta" onclick="oRecEd()">Gestisci</button></div></div>';
  h+='<div class="stg"><div class="stgl">Backup</div><div class="stgi"><div class="stil"><div class="stit">Esporta JSON</div><div class="stis">Backup completo</div></div><button type="button" class="sta" onclick="expD()">Esporta</button></div>';
  h+='<div class="stgi"><div class="stil"><div class="stit">Importa JSON</div><div class="stis">Ripristina da backup</div></div><button type="button" class="sta" onclick="trigI()">Importa</button></div></div>';
  h+='<div class="stg"><div class="stgl">Danger zone</div><div class="stgi" style="border-radius:var(--r)"><div class="stil"><div class="stit">Cancella tutto</div><div class="stis">Elimina tutte le spese</div></div><button type="button" class="sta red" onclick="delAll()">Cancella</button></div></div>';
  h+='<input type="file" id="impF" accept=".json" style="display:none" onchange="impD(this)">';
  document.getElementById('sContent').innerHTML=h;
}

function oCatEd(){rCatEdUI();oM('mo-c')}
function rCatEdUI(){var h='<div class="cel">';if(S.cats){for(var i=0;i<S.cats.length;i++){var c=S.cats[i];h+='<div class="cei"><span class="cee">'+(c.emoji||'\uD83D\uDCCC')+'</span><span class="cen2">'+c.name+'</span><button type="button" class="ced" onclick="rmCat('+i+')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>'}}
  h+='</div><div class="cear"><input type="text" class="ceae" id="nce" placeholder="\uD83C\uDFAF" maxlength="4"><input type="text" class="cean" id="ncn" placeholder="Nome categoria..."><button type="button" class="ceab" onclick="addCat()">+</button></div>';
  document.getElementById('ceC').innerHTML=h}
function addCat(){var n=document.getElementById('ncn').value.trim();var e=document.getElementById('nce').value.trim()||'\uD83D\uDCCC';if(!n)return;if(!S.cats)S.cats=[];S.cats.push({name:n,emoji:e});R.child('categories').set(S.cats);rCatEdUI();toast('Aggiunta \u2713')}
function rmCat(i){showCfm('Rimuovere "'+S.cats[i].name+'"?',function(){S.cats.splice(i,1);R.child('categories').set(S.cats);rCatEdUI();toast('Rimossa \u2713')})}

function oBudEd(){
  var h='<p style="font-size:13px;color:var(--tx2);margin-bottom:16px">Imposta un budget mensile per categoria.</p>';
  if(S.cats){for(var i=0;i<S.cats.length;i++){var c=S.cats[i];var v=S.bud[c.name]||'';h+='<div class="bei"><span class="bee">'+(c.emoji||'')+'</span><span class="ben">'+c.name+'</span><input type="number" class="bein" id="bd-'+i+'" placeholder="\u20AC 0" value="'+v+'" inputmode="decimal"></div>'}}
  h+='<div style="margin-top:16px"><button type="button" class="sv" onclick="savBud()">Salva budget</button></div>';
  document.getElementById('beC').innerHTML=h;oM('mo-b');
}
function savBud(){var b={};if(S.cats){for(var i=0;i<S.cats.length;i++){var v=document.getElementById('bd-'+i).value;if(v&&parseFloat(v)>0)b[S.cats[i].name]=parseFloat(v)}}R.child('budgets').set(b).then(function(){toast('Budget salvato \u2713');cM('mo-b')})}

function oRecEd(){
  var h='<div style="margin-bottom:16px">';
  if(S.rec.length){for(var i=0;i<S.rec.length;i++){var rc=S.rec[i];h+='<div class="rci"><div class="rcii"><div class="rcin">'+rc.name+'</div><div class="rcis">'+(rc.category||'')+' \u00B7 giorno '+rc.dayOfMonth+'</div></div><span class="rcia">\u20AC'+fmt(rc.amount)+'</span><button type="button" class="ced" onclick="rmRec(\''+rc._id+'\')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>'}}
  else h+='<p style="font-size:13px;color:var(--tx3);text-align:center;padding:20px 0">Nessuna spesa ricorrente</p>';
  h+='</div><div class="atit" style="margin-bottom:10px">Aggiungi nuova</div><div class="ref">';
  h+='<div class="rer"><input type="text" class="rei" id="rn" placeholder="Nome (es. Netflix)"><input type="number" class="rei" id="ra" placeholder="\u20AC Importo" inputmode="decimal" style="width:110px;flex:none"></div>';
  h+='<div class="rer"><select class="res" id="rc">';
  if(S.cats){for(var j=0;j<S.cats.length;j++)h+='<option value="'+S.cats[j].name+'">'+(S.cats[j].emoji||'')+' '+S.cats[j].name+'</option>'}
  h+='</select><input type="number" class="rei" id="rd" placeholder="Giorno (1-28)" min="1" max="28" inputmode="numeric" style="width:110px;flex:none"></div>';
  h+='<button type="button" class="sv" onclick="addRec()">Aggiungi ricorrente</button></div>';
  document.getElementById('rcC').innerHTML=h;oM('mo-r');
}
function addRec(){var n=document.getElementById('rn').value.trim();var a=parseFloat(document.getElementById('ra').value);var c=document.getElementById('rc').value;var d=parseInt(document.getElementById('rd').value);if(!n||!a||!c||!d||d<1||d>28){toast('Compila tutti i campi',true);return}R.child('recurring').push().set({name:n,amount:a,category:c,dayOfMonth:d,lastGenerated:''}).then(function(){toast('Aggiunta \u2713');oRecEd()})}
function rmRec(id){showCfm('Rimuovere questa ricorrente?',function(){R.child('recurring').child(id).remove().then(function(){toast('Rimossa \u2713');oRecEd()})})}

function expD(){R.once('value').then(function(s){var j=JSON.stringify(s.val()||{},null,2);var b=new Blob([j],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='cashflow_'+td()+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);toast('Esportato \u2713')})}
function trigI(){document.getElementById('impF').click()}
function impD(inp){var f=inp.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(e){try{var d=JSON.parse(e.target.result);showCfm('Sovrascrivere i dati?',function(){R.set(d).then(function(){toast('Importato \u2713')})})}catch(er){toast('JSON non valido',true)}};rd.readAsText(f);inp.value=''}
function delAll(){showCfm('Eliminare TUTTE le spese?',function(){R.child('transactions').remove().then(function(){toast('Cancellato \u2713')})})}

function init(){document.getElementById('iDate').value=td();rQuick();ldCats();ldTxs();ldBud();ldRec();uSv();setTimeout(function(){document.getElementById('iAmt').focus()},300)}
init();
</script>
